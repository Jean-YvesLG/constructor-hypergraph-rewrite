<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="background:white;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; fill: #444; }
  </style>
</defs>

<!-- Panel borders -->
<rect x="20" y="20" width="305" height="220" rx="6" fill="none" stroke="#aaa" stroke-width="0.5"/>
<rect x="340" y="20" width="320" height="220" rx="6" fill="none" stroke="#aaa" stroke-width="0.5"/>
<rect x="20" y="260" width="305" height="240" rx="6" fill="none" stroke="#aaa" stroke-width="0.5"/>
<rect x="340" y="260" width="320" height="240" rx="6" fill="none" stroke="#aaa" stroke-width="0.5"/>

<!-- Panel labels -->
<text class="th" x="32" y="42" dominant-baseline="central">Panel A — Allowed arities</text>
<text class="th" x="352" y="42" dominant-baseline="central">Panel B — Disallowed structure</text>
<text class="th" x="32" y="282" dominant-baseline="central">Panel C — Node states</text>
<text class="th" x="352" y="282" dominant-baseline="central">Panel D — No multiplicity</text>

<!-- ===== PANEL A ===== -->
<!-- Arity 2 -->
<circle cx="45" cy="108" r="6" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="95" cy="108" r="6" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<line x1="51" y1="108" x2="89" y2="108" stroke="#1a1a1a" stroke-width="1.2"/>
<text class="ts" x="45" y="122" text-anchor="middle">u</text>
<text class="ts" x="95" y="122" text-anchor="middle">v</text>
<text class="ts" x="70" y="138" text-anchor="middle">arity 2</text>

<!-- Arity 3 -->
<circle cx="175" cy="90" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="148" cy="133" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="202" cy="133" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<polygon points="175,90 148,133 202,133" fill="#1a1a1a" fill-opacity="0.07" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round"/>
<text class="ts" x="175" y="79" text-anchor="middle">u</text>
<text class="ts" x="135" y="138" text-anchor="middle">v</text>
<text class="ts" x="215" y="138" text-anchor="middle">w</text>
<text class="ts" x="175" y="155" text-anchor="middle">arity 3</text>

<!-- Arity 4 -->
<circle cx="285" cy="88" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="258" cy="132" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="312" cy="132" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="285" cy="116" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<polygon points="285,88 258,132 312,132" fill="#1a1a1a" fill-opacity="0.07" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round"/>
<line x1="285" y1="95"  x2="285" y2="109" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="265" y1="132" x2="278" y2="120" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="305" y1="132" x2="292" y2="120" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3 2"/>
<text class="ts" x="285" y="155" text-anchor="middle">arity 4</text>

<!-- Panel A caption -->
<text class="ts" x="172" y="193" text-anchor="middle">Allowed hyperedges: arity 2, 3, 4  (rank ≤ 4)</text>

<!-- ===== PANEL B ===== -->
<circle cx="500" cy="75"  r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="545" cy="108" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="527" cy="158" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="473" cy="158" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="455" cy="108" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<polygon points="500,75 545,108 527,158 473,158 455,108" fill="#1a1a1a" fill-opacity="0.07" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round"/>
<line x1="448" y1="68" x2="556" y2="168" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
<line x1="556" y1="68" x2="448" y2="168" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
<text class="ts" x="500" y="193" text-anchor="middle">Hyperedges of arity &gt; 4 are not permitted</text>

<!-- ===== PANEL C ===== -->
<circle cx="80" cy="360" r="9" fill="#1a1a1a" fill-opacity="0.12" stroke="#1a1a1a" stroke-width="1.4"/>
<circle cx="120" cy="390" r="9" fill="#1a1a1a" fill-opacity="0.12" stroke="#1a1a1a" stroke-width="1.4"/>
<circle cx="55"  cy="390" r="9" fill="#1a1a1a" fill-opacity="0.12" stroke="#1a1a1a" stroke-width="1.4"/>
<polygon points="80,360 120,390 55,390" fill="#1a1a1a" fill-opacity="0.06" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round"/>
<line x1="132" y1="375" x2="155" y2="375" stroke="#888" stroke-width="0.8"/>
<text class="ts" x="160" y="375" dominant-baseline="central">active</text>
<text class="ts" x="160" y="392" dominant-baseline="central">(incident to ≥1 edge)</text>
<circle cx="80" cy="440" r="9" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3"/>
<line x1="92" y1="440" x2="155" y2="440" stroke="#888" stroke-width="0.8"/>
<text class="ts" x="160" y="440" dominant-baseline="central">inactive</text>
<text class="ts" x="160" y="457" dominant-baseline="central">(isolated)</text>
<text class="ts" x="172" y="487" text-anchor="middle">Node state: active = incident to ≥1 hyperedge</text>

<!-- ===== PANEL D ===== -->
<circle cx="400" cy="345" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="480" cy="345" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<line x1="408" y1="342" x2="472" y2="342" stroke="#1a1a1a" stroke-width="1.5"/>
<line x1="408" y1="349" x2="472" y2="349" stroke="#1a1a1a" stroke-width="1.5"/>
<text class="ts" x="400" y="330" text-anchor="middle">p</text>
<text class="ts" x="480" y="330" text-anchor="middle">q</text>
<line x1="424" y1="330" x2="460" y2="368" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
<line x1="460" y1="330" x2="424" y2="368" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
<line x1="498" y1="345" x2="516" y2="345" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<circle cx="548" cy="345" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<circle cx="628" cy="345" r="8" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
<line x1="556" y1="345" x2="620" y2="345" stroke="#1a1a1a" stroke-width="1.5"/>
<text class="ts" x="548" y="330" text-anchor="middle">p</text>
<text class="ts" x="628" y="330" text-anchor="middle">q</text>
<path d="M576,374 L584,382 L596,364" fill="none" stroke="#27ae60" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
<text class="ts" x="500" y="420" text-anchor="middle">Hyperedges are sets</text>
<text class="ts" x="500" y="438" text-anchor="middle">(no multiplicity)</text>
</svg>
